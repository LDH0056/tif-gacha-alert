name: keepalive
# GitHub은 60일간 repo에 커밋이 없으면 cron 워크플로우를 자동 비활성화함.
# 주 1회 빈 커밋을 찍어 그 타이머를 리셋 → alert 워크플로우가 영구히 살아있게 함.
on:
  schedule:
    - cron: '7 0 * * 1'   # 매주 월요일 00:07 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: empty commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "keepalive: 60일 스케줄 타이머 리셋"
          git push
